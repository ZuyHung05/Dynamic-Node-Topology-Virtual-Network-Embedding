num_nodes: 500
save_dir: dataset/p_net
topology:
  # file_path: './dataset/topology/Geant.gml'
  type: waxman
  wm_alpha: 0.5
  wm_beta: 0.2
partition:
  dynamic_node_candidates: [0, 1, 2, 3, 4, 5, 6, 7]
temporal:
  all_links_static: true
  node_activation_mode: markov
  dynamic_node_initial_active_prob: 0.5
  dynamic_node_on_to_off_prob: 0.5
  dynamic_node_off_to_on_prob: 0.3
  resample_node_activation_on_event: true
link_attrs_setting:
  - distribution: uniform
    dtype: int
    generative: true
    high: 100
    low: 50
    name: bw
    owner: link
    type: resource
  - name: max_bw
    originator: bw
    owner: link
    type: extrema
node_attrs_setting:
  - name: cpu
    distribution: uniform
    dtype: int
    generative: true
    high: 100
    low: 50
    owner: node
    type: resource
  - name: max_cpu
    originator: cpu
    owner: node
    type: extrema
  - name: gpu
    distribution: uniform
    dtype: int
    generative: true
    high: 100
    low: 50
    owner: node
    type: resource
  - name: max_gpu
    originator: gpu
    owner: node
    type: extrema
  - name: ram
    distribution: uniform
    dtype: int
    generative: true
    high: 100
    low: 50
    owner: node
    type: resource
  - name: max_ram
    originator: ram
    owner: node
    type: extrema
file_name: p_net.gml
